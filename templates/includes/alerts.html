{% if messages %} 
    {% for message in messages %}
        <div class="alert alert-{{message.tags}} show-notification" role="alert">
            <strong>
                {{message}}
                <button type="button" class="close" data-dismiss="alert" aria-label="Close" style="font-size: 25px;">
                    <span aria-hidden="true">&times;</span>
                </button>
            </strong>
        </div>
    {% endfor %}    
{% endif %}

<script>
    $(document).ready(function () {
        setTimeout(function () {
            $('.show-notification').fadeOut();
        }, 7000);
    });
</script>
