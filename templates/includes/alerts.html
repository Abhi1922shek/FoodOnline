{% if messages %} 
    {% for message in messages %}
        <div class="alert alert-{{message.tags}} show-notification" role="alert">
            <strong>
                {{message}}
                <button type="button" class="close" data-dismiss="alert" aria-label="Close" style="left-padding:5px">
                    <span aria-hidden="true">&times;</span>
                </button>
            </strong>
        </div>
    {% endfor %}    
{% endif %}
